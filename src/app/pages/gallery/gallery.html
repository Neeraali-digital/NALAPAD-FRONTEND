<!-- 2026 GALLERY / LIFE AT NALAPAD IMMERSIVE EXPERIENCE -->
<main class="relative bg-white pt-32 pb-20 overflow-hidden font-sans">
  
  <div class="fixed inset-0 pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-50/80 rounded-full blur-[100px] animate-float opacity-70"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-red-50/80 rounded-[100%] blur-[120px] animate-float-delayed opacity-50"></div>
  </div>

  <div class="relative z-10 max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="text-center mb-16 max-w-4xl mx-auto">
      <h2 class="text-sm font-black tracking-[0.3em] uppercase text-brand-primary mb-4 flex items-center justify-center gap-2">
        <span class="w-10 h-[2px] bg-brand-primary"></span>
        Life at Nalapad
        <span class="w-10 h-[2px] bg-brand-primary"></span>
      </h2>
      <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter leading-[0.9] text-neutral-900 drop-shadow-sm mb-6">
        Our <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-rose-500">Gallery</span>
      </h1>
    </div>

    <!-- FILTER BAR -->
    <div class="flex flex-wrap justify-center gap-4 mb-20">
      <button *ngFor="let cat of categories" 
              (click)="setCategory(cat.id)"
              class="px-8 py-3 rounded-full text-[0.65rem] font-black uppercase tracking-widest transition-all duration-500"
              [class.bg-brand-primary]="activeCategory === cat.id"
              [class.text-white]="activeCategory === cat.id"
              [class.shadow-xl]="activeCategory === cat.id"
              [class.bg-neutral-100]="activeCategory !== cat.id"
              [class.text-neutral-500]="activeCategory !== cat.id"
              [class.hover:bg-neutral-200]="activeCategory !== cat.id">
        {{ cat.name }}
      </button>
    </div>

    <!-- SCROLLABLE GALLERY GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      
      <div *ngFor="let item of filteredItems" 
           class="group relative h-[450px] rounded-[3rem] overflow-hidden bg-neutral-100 shadow-xl transition-all duration-700 hover:scale-[1.02] hover:-translate-y-2">
        
        <!-- IMAGE TYPE -->
        <ng-container *ngIf="item.type === 'image'">
          <img [src]="item.src + '?auto=format&fit=crop&q=80&w=800'" [alt]="item.title" class="w-full h-full object-cover transition duration-[3s] group-hover:scale-110">
        </ng-container>

        <!-- VIDEO TYPE -->
        <ng-container *ngIf="item.type === 'video'">
          <div class="absolute inset-0 pointer-events-none">
            <iframe class="w-full h-full pointer-events-none grayscale opacity-30 group-hover:opacity-100 group-hover:grayscale-0 transition-all duration-1000" [src]="item.src + '?autoplay=1&mute=1&controls=0&loop=1&playlist=' + item.src.split('/').pop()" frameborder="0" allow="autoplay; encrypted-media"></iframe>
          </div>
          <div class="absolute inset-0 bg-neutral-950/20 flex flex-col items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity">
            <div class="w-20 h-20 bg-white/20 backdrop-blur-xl rounded-full flex items-center justify-center text-white border border-white/30">
               <svg class="w-10 h-10 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </ng-container>

        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
          <span class="text-brand-primary text-[0.6rem] font-bold uppercase tracking-[0.4em] mb-2 italic">{{ item.category }}</span>
          <h3 class="text-2xl font-black text-white uppercase tracking-tight">{{ item.title }}</h3>
          <p class="text-white/60 font-medium text-xs mt-1">{{ item.sub }}</p>
        </div>
      </div>

    </div>
    
  </div>
</main>
