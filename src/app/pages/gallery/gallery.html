<!-- 2026 GALLERY / LIFE AT NALAPAD IMMERSIVE EXPERIENCE -->
<main class="relative bg-white pt-32 pb-20 overflow-hidden font-sans">
  
  <div class="fixed inset-0 pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-50/80 rounded-full blur-[100px] animate-float opacity-70"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-red-50/80 rounded-[100%] blur-[120px] animate-float-delayed opacity-50"></div>
  </div>

  <div class="relative z-10 max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="text-center mb-16 max-w-4xl mx-auto">
      <h2 class="text-sm font-black tracking-[0.3em] uppercase text-brand-primary mb-4 flex items-center justify-center gap-2">
        <span class="w-10 h-[2px] bg-brand-primary"></span>
        Life at Nalapad
        <span class="w-10 h-[2px] bg-brand-primary"></span>
      </h2>
      <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter leading-[0.9] text-neutral-900 drop-shadow-sm mb-6">
        Our <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-rose-500">Gallery</span>
      </h1>
      <p class="text-xl text-neutral-500 font-medium">
        Experience the vibrant campus life, events, and clinical immersions that define the Nalapad nursing experience.
      </p>
    </div>

    <!-- Cinematic Masonry / Bento Grid -->
    <div class="grid grid-cols-1 md:grid-cols-12 auto-rows-[250px] gap-6">
      
      <!-- Big Feature Image -->
      <div class="md:col-span-8 row-span-2 relative rounded-[3rem] overflow-hidden group shadow-[0_20px_50px_rgba(0,0,0,0.08)] skeleton">
        <div class="absolute inset-0 bg-neutral-900">
          <img src="https://images.unsplash.com/photo-1543326127-185675c2e35b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Annual Sports" class="w-full h-full object-cover group-hover:scale-105 transition duration-[2s] mix-blend-luminosity hover:mix-blend-normal opacity-80 hover:opacity-100">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-8 z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
          <h3 class="text-3xl font-black text-white uppercase tracking-tight">Annual Sports Meet</h3>
          <p class="text-white/80 font-medium mt-2">Football championship finals.</p>
        </div>
      </div>
      
      <!-- Top Right Small -->
      <div class="md:col-span-4 row-span-1 relative rounded-[3rem] overflow-hidden group shadow-xl skeleton">
        <div class="absolute inset-0 bg-neutral-900">
          <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Cultural Events" class="w-full h-full object-cover group-hover:scale-105 transition duration-[2s] mix-blend-luminosity hover:mix-blend-normal opacity-80 hover:opacity-100">
        </div>
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
          <h3 class="text-xl font-black text-white uppercase tracking-tight">Cultural Events</h3>
        </div>
      </div>
      
      <!-- Bottom Right Small -->
      <div class="md:col-span-4 row-span-1 relative rounded-[3rem] overflow-hidden group shadow-xl skeleton">
        <div class="absolute inset-0 bg-brand-primary">
          <img src="https://images.unsplash.com/photo-1584432810601-6c7f27d2362b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Clinical Training" class="w-full h-full object-cover group-hover:scale-105 transition duration-[2s] opacity-60 mix-blend-multiply hover:mix-blend-normal hover:opacity-100">
        </div>
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-brand-primary/90 to-transparent p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
          <h3 class="text-xl font-black text-white uppercase tracking-tight">Clinical Training</h3>
        </div>
      </div>

      <!-- Left Small -->
      <div class="md:col-span-5 row-span-1 relative rounded-[3rem] overflow-hidden group shadow-xl skeleton">
        <div class="absolute inset-0 bg-neutral-900">
          <img src="https://images.unsplash.com/photo-1523580494112-071d22def106?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Graduation" class="w-full h-full object-cover group-hover:scale-105 transition duration-[2s] mix-blend-luminosity hover:mix-blend-normal opacity-80 hover:opacity-100">
        </div>
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
          <h3 class="text-xl font-black text-white uppercase tracking-tight">Graduation Day</h3>
        </div>
      </div>
      
      <!-- Right Wide -->
      <div class="md:col-span-7 row-span-1 relative rounded-[3rem] overflow-hidden group shadow-[0_20px_50px_rgba(0,0,0,0.08)] skeleton">
        <div class="absolute inset-0 bg-neutral-900 border border-white/10">
          <img src="https://images.unsplash.com/photo-1576091160550-2173ff9e5ee5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Labs" class="w-full h-full object-cover opacity-60 mix-blend-luminosity group-hover:mix-blend-normal group-hover:opacity-100 transition duration-[2s] group-hover:scale-105">
        </div>
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
          <h3 class="text-xl font-black text-white uppercase tracking-tight">State of the Art Labs</h3>
        </div>
      </div>

    </div>
    
  </div>
</main>
