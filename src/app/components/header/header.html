<!-- HEADER -->
<header class="fixed top-4 left-0 right-0 z-[999] px-4 flex justify-center w-full transition-all duration-300 pointer-events-none">
  <nav class="pointer-events-auto bg-white/95 backdrop-blur-3xl border border-gray-200 shadow-[0_8px_30px_rgba(0,0,0,0.08)] rounded-full px-4 sm:px-6 py-3 flex items-center justify-between w-full max-w-[90rem] mx-auto transition-all">
    
    <!-- Logo area -->
    <a routerLink="/" class="flex-shrink-0 flex items-center relative group gap-3">
      <div class="p-1 px-3 bg-transparent rounded-full transition-transform duration-300">
        <img src="/logo.png" alt="Nalapad Logo" class="h-12 w-auto object-contain">
      </div>
    </a>
    
    <!-- Navigation Links -->
    <div class="hidden lg:flex ml-auto mr-2 gap-1.5 items-center">
      <a routerLink="/" routerLinkActive="bg-brand-primary text-white" [routerLinkActiveOptions]="{exact: true}" class="px-5 py-2.5 rounded-full text-[0.7rem] font-bold tracking-[0.1em] uppercase text-gray-700 hover:text-brand-primary hover:bg-red-50 transition-all select-none">Home</a>
      
      <a routerLink="/gallery" routerLinkActive="bg-brand-primary text-white" class="px-5 py-2.5 rounded-full text-[0.7rem] font-bold tracking-[0.1em] uppercase text-gray-700 hover:text-brand-primary hover:bg-red-50 transition-all select-none">Gallery</a>
      
      <a routerLink="/facilities" routerLinkActive="bg-brand-primary text-white" class="px-5 py-2.5 rounded-full text-[0.7rem] font-bold tracking-[0.1em] uppercase text-gray-700 hover:text-brand-primary hover:bg-red-50 transition-all select-none">Facilities</a>
      
      <!-- Departments Dropdown -->
      <div class="relative group">
        <button routerLink="/departments" class="px-5 py-2.5 rounded-full text-[0.7rem] font-bold tracking-[0.1em] uppercase text-gray-700 hover:text-brand-primary hover:bg-red-50 transition-all select-none flex items-center gap-1 group">
          Departments
          <svg class="w-3 h-3 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>
        <div class="absolute top-12 left-0 mt-2 w-56 bg-white border border-gray-100 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 overflow-hidden transform origin-top-left -translate-y-2 group-hover:translate-y-0 text-sm z-[1000]">
          <a routerLink="/departments" class="block px-6 py-4 text-gray-800 hover:bg-red-50 hover:text-brand-primary font-bold border-b border-gray-50 uppercase text-[0.65rem] tracking-widest">B.Sc Nursing</a>
          <a routerLink="/departments" class="block px-6 py-4 text-gray-800 hover:bg-red-50 hover:text-brand-primary font-bold uppercase text-[0.65rem] tracking-widest">GNM</a>
        </div>
      </div>
      
      <!-- Admissions Dropdown -->
      <div class="relative group">
        <button routerLink="/admissions" class="px-5 py-2.5 rounded-full text-[0.7rem] font-bold tracking-[0.1em] uppercase text-gray-700 hover:text-brand-primary hover:bg-red-50 transition-all select-none flex items-center gap-1">
          Admissions
          <svg class="w-3 h-3 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>
        <div class="absolute top-12 left-0 mt-2 w-64 bg-white border border-gray-100 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 overflow-hidden transform origin-top-left -translate-y-2 group-hover:translate-y-0 text-sm z-[1000]">
          <a routerLink="/admissions" class="block px-6 py-4 text-gray-800 hover:bg-red-50 hover:text-brand-primary font-bold border-b border-gray-50 uppercase text-[0.65rem] tracking-widest">Domestic</a>
          <a routerLink="/admissions" class="block px-6 py-4 text-gray-800 hover:bg-red-50 hover:text-brand-primary font-bold border-b border-gray-50 uppercase text-[0.65rem] tracking-widest">International</a>
          <a routerLink="/admissions" class="block px-6 py-4 text-gray-800 hover:bg-red-50 hover:text-brand-primary font-bold border-b border-gray-50 uppercase text-[0.65rem] tracking-widest">Scholarship</a>
          <a routerLink="/admissions" class="block px-6 py-4 text-gray-800 hover:bg-red-50 hover:text-brand-primary font-bold uppercase text-[0.65rem] tracking-widest">Video Counselling</a>
        </div>
      </div>
      
      <a routerLink="/contact" routerLinkActive="bg-brand-primary text-white" class="px-5 py-2.5 rounded-full text-[0.7rem] font-bold tracking-[0.1em] uppercase text-gray-700 hover:text-brand-primary hover:bg-red-50 transition-all select-none">Contact</a>
    </div>

    <!-- Mobile Button -->
    <div class="flex items-center gap-4 lg:hidden ml-auto">
      <button class="p-2 text-gray-800 focus:outline-none bg-gray-100 rounded-full">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
      </button>
    </div>
    
  </nav>
</header>
