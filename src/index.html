<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nalapad Nursing College | Career in Healthcare</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Start Your Career in Healthcare with Real Clinical Exposure at Nalapad College. INC & KNC Approved, Affiliated to RGUHS. Admissions Open 2026." />
    <link rel="icon" type="image/jpeg" href="favicon.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <app-root>
      <!-- INITIAL LOADING INTERFACE -->
      <div id="initial-loader" style="position: fixed; inset: 0; background: white; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif;">
        <div style="position: relative; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center;">
          <img src="/logo.png" alt="Logo" style="height: 100px; width: auto; animation: loader-pulse 2s infinite ease-in-out;">
          <div style="margin-top: 30px; width: 140px; height: 3px; background: #f3f4f6; border-radius: 10px; overflow: hidden;">
            <div style="height: 100%; background: #cc0000; width: 40%; animation: loader-bar 1.5s infinite ease-in-out;"></div>
          </div>
        </div>
        <span style="font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6em; color: #cc0000; margin-top: 10px; animation: loader-fade 2s infinite;">NALAPAD 2026</span>
        
        <style>
          @keyframes loader-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
          }
          @keyframes loader-bar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
          }
          @keyframes loader-fade {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
          }
        </style>
      </div>
    </app-root>
  </body>
</html>
